name: AIUC-1 SOC 2 Compliance Lab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting dependencies
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 functions/ scripts/ tests/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv \
            --count --show-source --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length=120 functions/ scripts/ tests/

      - name: Check import ordering
        run: |
          isort --check-only --profile black functions/ scripts/ tests/

  # ──────────────────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests (343 tests)
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test Suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run test suite with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=functions \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --junitxml=test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Check coverage threshold
        run: |
          python -m pytest tests/ \
            --cov=functions \
            --cov-fail-under=75 \
            -q --no-header

  # ──────────────────────────────────────────────────────────────
  # Job 3: Terraform Validation
  # ──────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ──────────────────────────────────────────────────────────────
  # Job 4: Security Scan
  # ──────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit (Python security linter)
        run: |
          bandit -r functions/ scripts/ \
            -ll \
            --format json \
            --output bandit-report.json || true
          bandit -r functions/ scripts/ -ll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────
  # Job 5: Evidence Generation (on main only)
  # ──────────────────────────────────────────────────────────────
  evidence:
    name: Generate Evidence Artifacts
    runs-on: ubuntu-latest
    needs: [lint, test, terraform-validate, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Generate test evidence
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=functions \
            --cov-report=term-missing \
            --junitxml=evidence/ci_test_results.xml \
            2>&1 | tee evidence/ci_pytest_output.txt

      - name: Create CI evidence summary
        run: |
          cat > evidence/ci_evidence_summary.md << 'EOF'
          # CI/CD Evidence Summary
          
          **Generated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Workflow:** ${{ github.workflow }}
          **Run ID:** ${{ github.run_id }}
          
          ## Pipeline Results
          - Lint: Passed
          - Tests: Passed (343/343)
          - Terraform Validate: Passed
          - Security Scan: Passed
          
          ## SOC 2 Relevance
          This CI/CD pipeline satisfies:
          - **CC8.1**: Changes are authorized, designed, developed, configured, documented, tested, approved, and implemented
          - **CC7.1**: Infrastructure and software are monitored for anomalies
          - **CC3.4**: Risk assessment includes consideration of potential changes
          EOF

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: evidence/
          retention-days: 90
